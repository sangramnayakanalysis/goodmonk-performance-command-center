name: GoodMonk Performance Monitor

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      no_resume:
        description: "Force a full clean run (ignore any saved run state)"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  monitor-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run GTmetrix monitoring batch
        id: run
        env:
          GTMETRIX_API_KEY: ${{ secrets.GTMETRIX_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        continue-on-error: true
        run: |
          if [ "${{ github.event.inputs.no_resume }}" = "true" ]; then
            python main.py --no-resume
          else
            python main.py
          fi

      - name: Report run outcome
        run: |
          if [ "${{ steps.run.outcome }}" = "success" ]; then
            echo "✅ All pages processed successfully."
          else
            echo "⚠️ Run finished with one or more failed pages."
          fi

      - name: Commit updated dashboard data + run state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dashboard/data/*.json data/run_state.json

          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
            exit 0
          fi

          git commit -m "chore: update performance data [skip ci]"

          git pull --rebase origin main || true

          git push origin HEAD:main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
